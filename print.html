<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Printable Submission — PPHE</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;background:#f0f2f8;color:#1c1c2e;font-size:14px;line-height:1.6}
.topbar{background:var(--accent,#2d5be3);padding:0}
.topbar-inner{max-width:760px;margin:0 auto;padding:10px 20px;display:flex;align-items:center;justify-content:space-between}
.topbar-inner .conf{color:rgba(255,255,255,.85);font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase}
.topbar-inner .ts{color:rgba(255,255,255,.7);font-size:11px}
.logo-row{max-width:760px;margin:0 auto;padding:22px 20px 4px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.logo-row img{height:38px;width:auto;display:block}
.title-block h1{font-size:21px;font-weight:700;color:#1c1c2e;letter-spacing:-.01em}
.title-block .ref{font-size:12px;color:#9090a8;margin-top:2px}
.container{max-width:760px;margin:10px auto 60px;padding:0 20px}
.card{background:#fff;border-radius:12px;margin-bottom:18px;border:1px solid #e2e2ec;overflow:hidden}
.sec-bar{display:flex;align-items:center;gap:10px;background:var(--accent-light,#eef2fd);padding:11px 16px}
.sec-num{background:var(--accent,#2d5be3);color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.sec-bar span{font-size:12px;font-weight:700;color:var(--accent-dark,#1a3caa);text-transform:uppercase;letter-spacing:.05em}
table{width:100%;border-collapse:collapse}
td{padding:11px 16px;vertical-align:top;border-bottom:1px solid #eaeaf0}
tr:last-child td{border-bottom:none}
tr:nth-child(even){background:#f8f9fc}
.lbl{width:38%;font-size:12px;font-weight:700;color:#52526e}
.val{font-size:13px;color:#1c1c2e;white-space:pre-wrap}
.val.empty{color:#aaa;font-style:italic}
footer{text-align:center;font-size:11px;color:#9090a8;padding:18px 20px 30px}
.print-btn{display:block;margin:0 auto 20px;padding:10px 22px;border-radius:8px;border:1px solid #d0d0e0;background:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:#1c1c2e}
.err{max-width:600px;margin:60px auto;text-align:center;color:#c0392b;font-size:14px;padding:0 20px}
@media print{.print-btn{display:none!important}.card{border:1px solid #ccc;break-inside:avoid}body{background:#fff}}
</style>
</head>

  function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  function b64urlDecode(s){
    var b64 = s.split('-').join('+').split('_').join('/');
    while(b64.length % 4) b64 += '=';
    var bin = atob(b64);
    return decodeURIComponent(escape(bin));
  }

  function getPayload(){
    var params = new URLSearchParams(window.location.search);
    var d = params.get('d');
    if(!d) return null;
    try{
      return JSON.parse(b64urlDecode(d));
    }catch(e){
      return null;
    }
  }

  function render(){
    var app = document.getElementById('app');
    var data = getPayload();
    if(!data){
      app.innerHTML = '<div class="err">No submission data found in this link. Please open the printable link from the confirmation email.</div>';
      return;
    }

    var accent = data.accent || '#2d5be3';
    var accentDark = data.accentDark || '#1a3caa';
    var accentLight = accent + '19';
    document.documentElement.style.setProperty('--accent', accent);
    document.documentElement.style.setProperty('--accent-dark', accentDark);
    document.documentElement.style.setProperty('--accent-light', accentLight);

    var html = '';
    html += '<div class="topbar"><div class="topbar-inner">'
      + '<span class="conf">Strictly Confidential</span>'
      + (data.ts ? '<span class="ts">Submitted: '+esc(data.ts)+'</span>' : '')
      + '</div></div>';

    html += '<div class="logo-row">'
      + '<div class="title-block"><h1>'+esc(data.formTitle||'Submission')+'</h1>'
      + (data.refVal ? '<div class="ref">Ref: '+esc(data.refVal)+'</div>' : '')
      + '</div>'
      + '<img src="'+LOGO+'" alt="'+esc(data.company||'PPHE')+'">'
      + '</div>';

    html += '<div class="container">';

    (data.secs || []).forEach(function(sec, i){
      html += '<div class="card">';
      html += '<div class="sec-bar"><span class="sec-num">'+(i+1)+'</span><span>'+esc(sec.name)+'</span></div>';
      html += '<table>';
      (sec.rows || []).forEach(function(r){
        var empty = !r.val || !String(r.val).trim();
        html += '<tr>'
          + '<td class="lbl">'+esc(r.label)+'</td>'
          + '<td class="val'+(empty?' empty':'')+'">'+(empty ? '— not answered —' : esc(r.val))+'</td>'
          + '</tr>';
      });
      html += '</table></div>';
    });

    html += '<button class="print-btn" onclick="window.print()">&#128438; Print / Save as PDF</button>';
    html += '</div>';

    html += '<footer>'+esc(data.formTitle||'Submission')+' &middot; '+esc(data.company||'PPHE')+' &middot; Strictly Confidential</footer>';

    app.innerHTML = html;
    document.title = (data.formTitle||'Submission') + ' — ' + (data.company||'PPHE');
  }

  render();
